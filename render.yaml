services:
  - type: web
    name: training-dashboard-api
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: training-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: "lax"
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: training-dashboard-redis
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: PASSWORD_RESET_URL
        sync: false
      - key: EMAIL_VERIFICATION_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_PREFIX
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: JSON_LOGS
        value: "true"
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: training-dashboard-worker
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: training-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: training-dashboard-redis
          property: connectionString
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_PREFIX
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: JSON_LOGS
        value: "true"
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: training-dashboard-frontend
    runtime: static
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SOURCEMAP
        value: "false"
      - key: VITE_SENTRY_DSN
        sync: false

databases:
  - name: training-dashboard-db
    databaseName: training_dashboard
    user: training_dashboard
    plan: starter

keyValueStores:
  - name: training-dashboard-redis
    plan: starter
