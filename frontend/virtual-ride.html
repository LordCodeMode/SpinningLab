<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Ride (Fallback)</title>
  <link rel="stylesheet" href="/static/css/pages/virtual-ride.css" />
</head>
<body class="virtual-ride-fallback">
  <div class="virtual-ride-fallback__panel">
    <div>
      <strong>Fallback Runtime Active</strong>
      <div class="virtual-ride-fallback__note">Unity failed/timed out. Live metrics continue here to keep session control responsive.</div>
    </div>
    <div class="virtual-ride-fallback__grid">
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Power</div><div class="virtual-ride-fallback__value" id="power">0 W</div></div>
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Cadence</div><div class="virtual-ride-fallback__value" id="cadence">0 rpm</div></div>
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Heart Rate</div><div class="virtual-ride-fallback__value" id="heartRate">0 bpm</div></div>
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Speed</div><div class="virtual-ride-fallback__value" id="speed">0.0 km/h</div></div>
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Grade</div><div class="virtual-ride-fallback__value" id="grade">0.0 %</div></div>
      <div class="virtual-ride-fallback__metric"><div class="virtual-ride-fallback__label">Distance</div><div class="virtual-ride-fallback__value" id="distance">0.00 km</div></div>
    </div>
  </div>

  <script type="module" src="/src/virtual-ride-main.js"></script>
</body>
</html>
