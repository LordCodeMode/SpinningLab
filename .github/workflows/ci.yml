name: CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      TESTING: "true"
      APP_ENV: test
      SECRET_KEY: test-secret-key-with-minimum-length-123456
      DATABASE_URL: sqlite:///./ci-test.db
      REDIS_ENABLED: "false"
      BACKEND_CORS_ORIGINS: '["http://localhost:8080"]'
      FRONTEND_BASE_URL: http://localhost:8080
      PASSWORD_RESET_URL: http://localhost:8080/index.html
      EMAIL_VERIFICATION_URL: http://localhost:8080/index.html
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend tests
        run: pytest --no-cov

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run frontend tests
        run: npm run test:run
      - name: Run production build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 >/tmp/training-dashboard-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap "kill $PREVIEW_PID" EXIT
          npx wait-on http://127.0.0.1:4173/index.html
          npm run test:e2e
